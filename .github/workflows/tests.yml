name: tests

on:
  workflow_dispatch:
    inputs:
      full_browsers:
        description: Run Chromium, Firefox, and WebKit E2E projects
        required: false
        type: boolean
        default: false
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Run Type Analysis
        run: composer types:check

      - name: Tests
        run: php artisan test

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
          npm ci

      - name: Build assets
        run: npm run build

      - name: Install Chromium
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.full_browsers }}
        run: npx playwright install --with-deps chromium

      - name: Install full browser matrix
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_browsers }}
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright tests
        env:
          CI: true
          PLAYWRIGHT_FULL_BROWSERS: ${{ github.event_name == 'workflow_dispatch' && inputs.full_browsers && 'true' || 'false' }}
        run: npm run test:e2e

      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-diagnostics-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
            storage/logs/*.log
          if-no-files-found: ignore
          retention-days: 14
